<style>
:root {
  --bg:      #0d1117;
  --surface: #161b22;
  --surface2:#21262d;
  --border:  #30363d;
  --text:    #e6edf3;
  --muted:   #8b949e;
  --accent:  #e8401c;
  --blue:    #388bfd;
  --green:   #3fb950;
  --red:     #f85149;
  --yellow:  #d29922;
  --purple:  #a371f7;
  --font:    'Noto Sans KR', sans-serif;
  --mono:    'JetBrains Mono', monospace;

* { box-sizing:border-box; margin:0; padding:0; }
body { font-family:var(--font); background:var(--bg); color:var(--text); min-height:100vh; }

/* ── 네비게이션 ── */
nav {
  position:sticky; top:0; z-index:100;
  background:rgba(22,27,34,.98); backdrop-filter:blur(16px);
  border-bottom:1px solid rgba(56,139,253,.2);
  padding:0 16px; min-height:52px; height:auto;
  display:flex; align-items:center; gap:0; flex-wrap:wrap;
}
.nav-logo { font-weight:700; font-size:14px; color:var(--accent); margin-right:24px; white-space:nowrap; }
.nav-links { display:flex; gap:2px; }
.nav-link {
  padding:6px 14px; border-radius:6px; font-size:13px; font-weight:500;
  color:var(--muted); text-decoration:none; transition:all .15s;
}
.nav-link:hover { color:var(--text); background:var(--surface2); }
.nav-link.active { color:var(--text); background:var(--surface2); }
.nav-right { margin-left:auto; display:flex; align-items:center; gap:8px; }
.btn-pdf {
  padding:6px 14px; border-radius:6px; font-size:12px; font-weight:600;
  background:var(--accent); color:#fff; border:none; cursor:pointer;
  transition:opacity .15s; font-family:var(--font);
}
.btn-pdf:hover { opacity:.85; }

/* ── 메인 레이아웃 ── */
.container { max-width:1100px; margin:0 auto; padding:28px 24px 60px; }

/* ── 페이지 헤더 ── */
.page-header {
  background: linear-gradient(135deg, #1a1f2e 0%, #161b22 100%);
  border:1px solid var(--border); border-radius:12px;
  padding:24px 28px; margin-bottom:24px;
  display:flex; align-items:center; justify-content:space-between;
}
.page-title-block .label { font-size:11px; font-weight:600; color:var(--muted); letter-spacing:.1em; text-transform:uppercase; }
.page-title-block h1 { font-size:22px; font-weight:700; margin-top:4px; }
.page-title-block .subtitle { font-size:13px; color:var(--muted); margin-top:4px; }
.month-filter { display:flex; gap:6px; flex-wrap:wrap; justify-content:flex-end; }
.month-btn {
  width:36px; height:36px; border-radius:8px; border:1px solid var(--border);
  background:var(--surface2); color:var(--muted); font-size:12px; font-weight:600;
  cursor:pointer; transition:all .15s; font-family:var(--font);
}
.month-btn:hover { border-color:var(--blue); color:var(--blue); }
.month-btn.active { background:var(--accent); border-color:var(--accent); color:#fff; }
.month-btn:disabled { opacity:.3; cursor:not-allowed; }

/* ── KPI 카드 ── */
.kpi-row { display:grid; grid-template-columns:repeat(5,1fr); gap:12px; margin-bottom:24px; }
.kpi-card {
  background:var(--surface); border:1px solid var(--border); border-radius:10px;
  padding:16px 18px;
}
.kpi-card .kpi-label { font-size:11px; color:var(--muted); font-weight:500; margin-bottom:8px; }
.kpi-card .kpi-value { font-size:22px; font-weight:700; font-family:var(--mono); }
.kpi-card .kpi-meta { margin-top:8px; display:flex; gap:6px; flex-wrap:wrap; }
.badge {
  font-size:11px; font-weight:600; padding:2px 7px; border-radius:4px;
  font-family:var(--mono);
}
.badge.up   { background:rgba(63,185,80,.15); color:var(--green); }
.badge.down { background:rgba(248,81,73,.15); color:var(--red); }
.badge.neu  { background:rgba(139,148,158,.12); color:var(--muted); }
.badge.blue { background:rgba(56,139,253,.15); color:var(--blue); }
.badge-lbl { font-size:9px; opacity:.7; margin-right:3px; font-weight:500; letter-spacing:.03em; }

/* ── 섹션 ── */
.section { margin-bottom:24px; }
.section-header {
  display:flex; align-items:center; justify-content:space-between;
  margin-bottom:12px;
}
.section-title { font-size:13px; font-weight:600; color:var(--muted); text-transform:uppercase; letter-spacing:.08em; }

/* ── PL 테이블 ── */
.pl-table-wrap { 
  background:var(--surface); border:1px solid var(--border); border-radius:10px;
  overflow-x:auto; -webkit-overflow-scrolling:touch;
}
.pl-table { width:100%; border-collapse:collapse; font-size:13px; }
.pl-table th {
  background:var(--surface2); padding:10px 14px; text-align:right;
  font-size:11px; font-weight:600; color:var(--muted); letter-spacing:.06em;
  border-bottom:1px solid var(--border); white-space:nowrap;
}
.pl-table th:first-child { text-align:left; min-width:200px; }
.pl-table td { padding:8px 14px; text-align:right; font-family:var(--mono); font-size:12px; border-bottom:1px solid rgba(48,54,61,.5); }
.pl-table td:first-child { text-align:left; font-family:var(--font); }

/* 당월 실적 열 강조 */
.pl-table .col-act {
  background: rgba(232,64,28,.12) !important;
  color: var(--text) !important;
  border-left: 2px solid rgba(232,64,28,.35);
  border-right: 2px solid rgba(232,64,28,.35);
}
.pl-table td.col-act {
  background: rgba(232,64,28,.06) !important;
  border-left: 2px solid rgba(232,64,28,.2);
  border-right: 2px solid rgba(232,64,28,.2);
  font-weight: 600;
  color: var(--text);
}
.pl-table tr:last-child td { border-bottom:none; }

/* 행 타입별 스타일 */
.row-header td { background:rgba(30,36,44,.6); }
.row-header td:first-child { font-weight:700; font-size:13px; color:var(--text); font-family:var(--font); }
.row-total td { background:rgba(56,139,253,.06); border-top:1px solid rgba(56,139,253,.2) !important; border-bottom:1px solid rgba(56,139,253,.2) !important; }
.row-total td:first-child { font-weight:700; color:var(--blue); font-family:var(--font); font-size:13px; }
.row-total.profit td:first-child { color:var(--green); }
.row-total.loss td:first-child { color:var(--red); }
.row-sub td:first-child { font-weight:600; color:var(--text); padding-left:20px; }
.row-detail td:first-child { color:var(--muted); padding-left:36px; font-size:12px; }
.row-detail td { color:var(--muted); }

/* MoM 색상 */
.pos { color:var(--green); }
.neg { color:var(--red); }
.neu-txt { color:var(--muted); }

/* ── 총평 섹션 ── */
.comment-box {
  background:var(--surface); border:1px solid var(--border); border-radius:10px;
  padding:20px 24px;
}
.comment-box .comment-label { font-size:11px; font-weight:600; color:var(--muted); text-transform:uppercase; letter-spacing:.08em; margin-bottom:12px; }
.comment-placeholder { color:var(--muted); font-size:13px; line-height:1.7; font-style:italic; }

/* ── 연결 상태 ── */
.status-bar {
  display:flex; align-items:center; gap:8px;
  padding:10px 16px; border-radius:8px; margin-bottom:20px;
  font-size:12px; font-weight:500;
}
.status-bar.loading { background:rgba(56,139,253,.1); border:1px solid rgba(56,139,253,.2); color:var(--blue); }
.status-bar.error   { background:rgba(248,81,73,.1);  border:1px solid rgba(248,81,73,.2);  color:var(--red); }
.status-bar.ok      { background:rgba(63,185,80,.1);  border:1px solid rgba(63,185,80,.2);  color:var(--green); }
.spinner { width:14px; height:14px; border:2px solid currentColor; border-top-color:transparent; border-radius:50%; animation:spin .7s linear infinite; }
@keyframes spin { to { transform:rotate(360deg); } }


/* ── 모바일 네비게이션 ── */
@media (max-width: 640px) {
  nav { padding: 8px 12px; gap: 6px; }
  .nav-logo { margin-right: 8px; font-size: 13px; }

  .month-filter { justify-content: flex-start; }
  .kpi-row { grid-template-columns: repeat(2, 1fr); }
  .container { padding: 14px 12px; }
}

@media print {
  nav { display:none; }
  .btn-pdf { display:none; }
  .month-filter { display:none; }
  body { background:#fff; color:#000; }
  .pl-table-wrap { border:1px solid #ddd; }
  .pl-table th { background:#f5f5f5; color:#555; }
}
</style>

// ── 상태 ──

// ── JSONP ──
function fetchJSONP(url) {
  return new Promise((resolve, reject) => {
    const cb = 'jsonp_' + Date.now() + '_' + Math.random().toString(36).slice(2);
    const s = document.createElement('script');
    const timer = setTimeout(() => { delete window[cb]; s.remove(); reject(new Error('timeout')); }, 30000);
    window[cb] = (data) => { clearTimeout(timer); delete window[cb]; s.remove(); resolve(data); };
    s.onerror = () => { clearTimeout(timer); delete window[cb]; reject(new Error('JSONP error')); };
    s.src = url + (url.includes('?') ? '&' : '?') + 'callback=' + cb;
    document.head.appendChild(s);
  });
}

// ── 숫자 포맷 ──
const fmt  = v => v == null ? '—' : (Math.round(v/1e6)).toLocaleString();
const fmtA = v => v == null ? '—' : (v/1e8).toFixed(1) + '억';
const pct  = (a,b) => (!b || b===0) ? '—' : (a/b*100).toFixed(1) + '%';
const mom  = (a,b) => {
  if (!b) return {txt:'—', cls:'neu-txt'};
  const r = (a-b)/Math.abs(b)*100;
  if (Math.abs(r) < 0.05) return {txt:'±0%', cls:'neu-txt'};
  return r > 0
    ? {txt:'▲' + r.toFixed(1) + '%', cls:'pos'}
    : {txt:'▼' + Math.abs(r).toFixed(1) + '%', cls:'neg'};
};

// ── 데이터에서 값 추출 (행번호 기반) ──
function colIdx(m) { return 11 + 9*(m-1); }
function getVal(rows, rowIdx, m) {
  if (rowIdx === 'GROSS') return null;
  if (!rows || rowIdx >= rows.length) return 0;
  const v = rows[rowIdx][colIdx(m)];
  return (typeof v === 'number') ? v : 0;
}

// ── 월 탭 렌더 ──
function renderMonthFilter() {
  const el = document.getElementById('monthFilter');
  el.innerHTML = '';
  for (let m = 1; m <= 12; m++) {
    const btn = document.createElement('button');
    btn.className = 'month-btn' + (m === state.month ? ' active' : '');
    btn.textContent = m + '월';
    if (m > state.maxMonth) btn.disabled = true;
    btn.onclick = () => { state.month = m; renderAll(); };
    el.appendChild(btn);
  }
}

// ── KPI 카드 렌더 ──
function renderKPI() {
  const { month, raw, tgt, ly } = state;
  const prev = month > 1 ? month - 1 : null;

  // 행번호 직접 사용: 매출액=8, 매출원가=22, 판관비(전체)=260, 세전이익(전체)=478
  const rev_act  = getVal(raw, 8, month);
  const rev_tgt  = getVal(tgt, 8, month);
  const rev_ly   = getVal(ly,  8, month);
  const rev_prev = prev ? getVal(raw, 8, prev) : null;

  const gross_act = getVal(raw, 8, month) - getVal(raw, 22, month);
  const gross_tgt = getVal(tgt, 8, month) - getVal(tgt, 22, month);

  const sg_act   = getVal(raw, 260, month);
  const sg_prev  = prev ? getVal(raw, 260, prev) : null;

  const net_act  = getVal(raw, 478, month);
  const net_tgt  = getVal(tgt, 478, month);
  const net_ly   = getVal(ly,  478, month);
  const net_prev = prev ? getVal(raw, 478, prev) : null;

  const oi_act  = getVal(raw, 436, month);
  const oi_prev = prev ? getVal(raw, 436, prev) : null;

  const cards = [
    { label:'매출액',   val:fmtA(rev_act),   achv:pct(rev_act,rev_tgt),   mom:mom(rev_act,rev_prev),   ly:fmtA(rev_ly) },
    { label:'매출이익', val:fmtA(gross_act), achv:pct(gross_act,gross_tgt), mom:null,                   ly:null },
    { label:'판관비',   val:fmtA(sg_act),    achv:null,                    mom:mom(sg_act,sg_prev),     ly:null },
    { label:'영업이익', val:fmtA(oi_act),    achv:null,                    mom:mom(oi_act,oi_prev),     ly:null },
    { label:'세전이익', val:fmtA(net_act),   achv:pct(net_act,net_tgt),   mom:mom(net_act,net_prev),   ly:fmtA(net_ly) },
  ];

  const el = document.getElementById('kpiRow');
  el.innerHTML = cards.map(c => {
    const achvBadge = c.achv ? `<span class="badge ${parseFloat(c.achv)>=100?'up':'down'}"><span class="badge-lbl">달성률</span>${c.achv}</span>` : '';
    const momBadge  = c.mom  ? `<span class="badge ${c.mom.cls==='pos'?'up':c.mom.cls==='neg'?'down':'neu'}"><span class="badge-lbl">전년대비</span>${c.mom.txt}</span>` : '';
    const lyTxt     = c.ly   ? `<span style="font-size:11px;color:var(--muted)">전년 ${c.ly}</span>` : '';
    return `<div class="kpi-card">
      <div class="kpi-label">${c.label}</div>
      <div class="kpi-value">${c.val}</div>
      <div class="kpi-meta">${achvBadge}${momBadge}${lyTxt}</div>
    </div>`;
  }).join('');
}

// ── PL 테이블 렌더 ──
function renderPL() {
  const { month, raw, tgt, ly } = state;
  const prev = month > 1 ? month - 1 : null;

  // 행번호: 매출액=8, 매출원가=22
  const rev_act  = getVal(raw, 8,  month);
  const cogs_act = getVal(raw, 22, month);
  const rev_tgt  = getVal(tgt, 8,  month);
  const cogs_tgt = getVal(tgt, 22, month);
  const rev_ly   = getVal(ly,  8,  month);
  const cogs_ly  = getVal(ly,  22, month);
  const rev_prev = prev ? getVal(raw, 8,  prev) : 0;
  const cogs_prev= prev ? getVal(raw, 22, prev) : 0;

  const tbody = document.getElementById('plBody');
  let html = '';

  ACCOUNTS.forEach(acc => {
    let act, tgtV, lyV, prevV;

    if (acc.row === 'GROSS') {
      act  = rev_act  - cogs_act;
      tgtV = rev_tgt  - cogs_tgt;
      lyV  = rev_ly   - cogs_ly;
      prevV= prev ? (rev_prev - cogs_prev) : null;
    } else {
      act  = getVal(raw, acc.row, month);
      tgtV = getVal(tgt, acc.row, month);
      lyV  = getVal(ly,  acc.row, month);
      prevV= prev ? getVal(raw, acc.row, prev) : null;
    }

    const achv = pct(act, tgtV);
    const achvPct = tgtV ? act/tgtV*100 : null;
    const momV = mom(act, prevV);
    const yoy  = mom(act, lyV);

    // 달성률 색상
    const achvCls = achvPct == null ? 'neu-txt' : achvPct >= 100 ? 'pos' : achvPct >= 80 ? 'neu-txt' : 'neg';
    // 이익 행은 음수가 나쁜 것
    const isProfitRow = [436, 478, 'GROSS'].includes(acc.row);

    let rowClass = 'row-' + acc.type;
    if (acc.type === 'total') {
      if (isProfitRow && act < 0) rowClass += ' loss';
      else if (isProfitRow) rowClass += ' profit';
    }

    // 판관비·원가는 증가가 나쁜 것 → MoM 반전
    // 비용행: 매출원가(22,23,30), 판관비전체(260~435), 영업외비용(455~477)
    const isCostRow = [22,23,30,260].includes(acc.row) ||
      (typeof acc.row==='number' && acc.row>=261 && acc.row<=435) ||
      (typeof acc.row==='number' && acc.row>=455 && acc.row<=477);

    const momCls = isCostRow
      ? (momV.cls==='pos'?'neg':momV.cls==='neg'?'pos':momV.cls)
      : momV.cls;

    html += `<tr class="${rowClass}">
      <td>${acc.name}</td>
      <td>${prevV != null ? fmt(prevV) : '—'}</td>
      <td class="col-act">${fmt(act)}</td>
      <td>${fmt(tgtV)}</td>
      <td class="${achvCls}">${achv}</td>
      <td>${fmt(lyV)}</td>
      <td class="${yoy.cls}">${yoy.txt}</td>
      <td class="${momCls}">${momV.txt}</td>
    </tr>`;
  });

  tbody.innerHTML = html;
}

// ── 전체 렌더 ──
function renderAll() {
  renderMonthFilter();
  document.getElementById('reportSubtitle').textContent = `2026년 ${state.month}월 기준`;
  renderKPI();
  renderPL();
}

// ── 데이터 로드 ──
async function loadData() {
  const bar = document.getElementById('statusBar');
  try {
    const payload = await fetchJSONP(SCRIPT_URL + '?action=getRaw');
    if (!payload || !payload.raw_2026) throw new Error('raw_2026 시트 없음');

    state.raw = payload.raw_2026;
    state.tgt = payload.raw_target_26 || [];
    state.ly  = payload.raw_lastyear  || [];

    // raw_2026 매출액 행(index 8) 기준으로 데이터 있는 마지막 월 감지
    let maxMonth = 1;
    for (let m = 1; m <= 12; m++) {
      const v = getVal(payload.raw_2026, 8, m);
      if (v && v > 0) maxMonth = m;
    }
    state.month    = maxMonth;
    state.maxMonth = maxMonth;

    bar.className = 'status-bar ok';
    bar.innerHTML = `<span>✓ 구글시트 연결됨 · ${maxMonth}월까지 데이터</span>`;
    setTimeout(() => bar.style.display='none', 2000);

    renderAll();
  } catch(e) {
    bar.className = 'status-bar error';
    bar.innerHTML = `<span>⚠ 데이터 로드 실패: ${e.message}</span>`;
  }
}

// ── 초기화 ──
renderMonthFilter();
loadData();
</script>
